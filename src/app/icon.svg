<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0a1628"/>
  <g transform="translate(16,16) rotate(-45) translate(-16,-16)">
    <!-- Key ring -->
    <circle cx="10" cy="16" r="5" fill="none" stroke="#c9a84c" stroke-width="2.2"/>
    <!-- Key hole -->
    <circle cx="10" cy="16" r="1.8" fill="#0a1628"/>
    <!-- Shaft -->
    <rect x="15" y="14.8" width="11" height="2.4" rx="1.2" fill="#c9a84c"/>
    <!-- Teeth -->
    <rect x="21" y="17.2" width="2.5" height="2.8" rx="0.5" fill="#c9a84c"/>
    <rect x="17" y="17.2" width="2" height="2" rx="0.5" fill="#c9a84c"/>
  </g>
</svg>
