<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Tristar Locksmith — Content Admin</title>
  </head>
  <body>
    <!-- Decap CMS — https://decapcms.org -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      var isLocal =
        window.location.hostname === 'localhost' ||
        window.location.hostname === '127.0.0.1';

      CMS.init({
        config: {
          backend: isLocal
            ? { name: 'git-gateway' }
            : {
                name: 'github',
                repo: 'idomenashko/tristar-locksmith',
                branch: 'master',
                base_url: 'https://tristar-locksmith.vercel.app',
                auth_endpoint: 'api/auth/callback',
              },

          local_backend: isLocal,

          media_folder: 'public/images',
          public_folder: '/images',

          collections: [
            {
              name: 'business',
              label: 'Business Info',
              files: [
                {
                  name: 'business',
                  label: 'Business Info',
                  file: 'content/business.json',
                  fields: [
                    { label: 'Business Name', name: 'name', widget: 'string' },
                    { label: 'Phone', name: 'phone', widget: 'string' },
                    {
                      label: 'Phone Href',
                      name: 'phoneHref',
                      widget: 'string',
                      hint: 'Format: tel:8653813931',
                    },
                    { label: 'Hours', name: 'hours', widget: 'string' },
                    { label: 'City', name: 'city', widget: 'string' },
                    { label: 'State', name: 'state', widget: 'string' },
                    { label: 'Address', name: 'address', widget: 'string' },
                    { label: 'Logo', name: 'logo', widget: 'image', hint: 'Transparent PNG recommended', required: false },
                  ],
                },
              ],
            },

            {
              name: 'content',
              label: 'Content',
              files: [
                {
                  name: 'testimonials',
                  label: 'Testimonials',
                  file: 'content/testimonials.json',
                  fields: [
                    {
                      label: 'Testimonials',
                      name: 'items',
                      widget: 'list',
                      fields: [
                        { label: 'Name', name: 'name', widget: 'string' },
                        {
                          label: 'Rating',
                          name: 'rating',
                          widget: 'number',
                          min: 1,
                          max: 5,
                          value_type: 'int',
                          default: 5,
                        },
                        { label: 'Review Text', name: 'text', widget: 'text' },
                        {
                          label: 'Location',
                          name: 'location',
                          widget: 'string',
                          hint: 'e.g. Knoxville, TN',
                        },
                      ],
                    },
                  ],
                },

                {
                  name: 'faq',
                  label: 'FAQ',
                  file: 'content/faq.json',
                  fields: [
                    {
                      label: 'FAQ Items',
                      name: 'items',
                      widget: 'list',
                      fields: [
                        { label: 'Question', name: 'question', widget: 'string' },
                        { label: 'Answer', name: 'answer', widget: 'text' },
                      ],
                    },
                  ],
                },

                {
                  name: 'advantages',
                  label: 'Why Choose Us',
                  file: 'content/advantages.json',
                  fields: [
                    {
                      label: 'Advantages',
                      name: 'items',
                      widget: 'list',
                      fields: [
                        {
                          label: 'Icon',
                          name: 'icon',
                          widget: 'string',
                          hint: 'Paste an emoji (e.g. ⚡)',
                        },
                        { label: 'Title', name: 'title', widget: 'string' },
                        { label: 'Description', name: 'description', widget: 'text' },
                      ],
                    },
                  ],
                },
              ],
            },

            {
              name: 'services',
              label: 'Services',
              files: [
                {
                  name: 'services',
                  label: 'Services',
                  file: 'content/services.json',
                  fields: [
                    {
                      label: 'Services',
                      name: 'items',
                      widget: 'list',
                      fields: [
                        {
                          label: 'Slug',
                          name: 'slug',
                          widget: 'string',
                          hint: 'URL slug — e.g. car-lockout (lowercase, hyphens only)',
                        },
                        { label: 'Title', name: 'title', widget: 'string' },
                        {
                          label: 'Icon',
                          name: 'icon',
                          widget: 'string',
                          hint: 'Paste an emoji',
                        },
                        {
                          label: 'Short Description',
                          name: 'shortDescription',
                          widget: 'text',
                        },
                        {
                          label: 'Long Description',
                          name: 'longDescription',
                          widget: 'text',
                        },
                        {
                          label: 'Features',
                          name: 'features',
                          widget: 'list',
                          field: { label: 'Feature', name: 'feature', widget: 'string' },
                        },
                        {
                          label: 'FAQs',
                          name: 'faqs',
                          widget: 'list',
                          fields: [
                            { label: 'Question', name: 'question', widget: 'string' },
                            { label: 'Answer', name: 'answer', widget: 'text' },
                          ],
                        },
                      ],
                    },
                  ],
                },
              ],
            },

            {
              name: 'service-areas',
              label: 'Service Areas',
              files: [
                {
                  name: 'service-areas',
                  label: 'Service Areas',
                  file: 'content/service-areas.json',
                  fields: [
                    {
                      label: 'Service Areas',
                      name: 'items',
                      widget: 'list',
                      fields: [
                        {
                          label: 'Slug',
                          name: 'slug',
                          widget: 'string',
                          hint: 'URL slug — e.g. knoxville (lowercase, hyphens only)',
                        },
                        { label: 'Name', name: 'name', widget: 'string' },
                        { label: 'Region', name: 'region', widget: 'string' },
                        { label: 'Description', name: 'description', widget: 'text' },
                        {
                          label: 'Nearby Areas',
                          name: 'nearbyAreas',
                          widget: 'list',
                          field: { label: 'Area', name: 'area', widget: 'string' },
                        },
                      ],
                    },
                  ],
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
